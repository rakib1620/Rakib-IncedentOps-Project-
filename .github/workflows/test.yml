name: Deploy IncidentOps to AWS EC2

on:
  push:
    branches:
      - main  # আপনি মেইন ব্রাঞ্চে পুশ করলেই এটি একা একা চালু হবে

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1 # আপনার EC2 ইনস্ট্যান্স যে রিজিয়নে আছে (যেমন মুম্বাই হলে ap-south-1)

      - name: Deploy to EC2 via AWS SSM
        run: |
          echo "Connecting to AWS EC2 to pull the latest code and start the project..."
          # এখানে আমরা AWS SSM বা CLI কমান্ড দিয়ে সার্ভারে গিট পুল এবং নোড রান কমান্ড পাঠাতে পারি।